<h2>번역 작업 흐름은 어떻게 할까요?</h2>
<p class="subtitle">한 번에 몇 개의 파일을 처리하느냐에 따라 UX가 달라집니다</p>

<div class="options">
  <div class="option" data-choice="single" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>파일 1개씩 번역</h3>
      <div class="mockup" style="margin-top:12px">
        <div class="mockup-header">UI 미리보기</div>
        <div class="mockup-body" style="display:flex;flex-direction:column;gap:10px;padding:16px">
          <div class="mock-input" style="text-align:center;padding:20px;border:2px dashed #555">📄 파일 업로드 (클릭 또는 드래그)</div>
          <div style="display:flex;gap:8px">
            <div class="mock-input" style="flex:1">원본 언어: 자동 감지</div>
            <div class="mock-input" style="flex:1">번역 언어: 영어 ▼</div>
          </div>
          <div class="mock-button" style="text-align:center">번역 시작</div>
          <div class="mock-input" style="text-align:center;padding:12px;color:#4ade80">✅ 완료 → 다운로드</div>
        </div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="batch" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>여러 파일 한꺼번에 (배치)</h3>
      <div class="mockup" style="margin-top:12px">
        <div class="mockup-header">UI 미리보기</div>
        <div class="mockup-body" style="display:flex;flex-direction:column;gap:10px;padding:16px">
          <div class="mock-input" style="text-align:center;padding:20px;border:2px dashed #555">📁 여러 파일 드래그 (3개 선택됨)</div>
          <div style="display:flex;flex-direction:column;gap:4px;font-size:13px">
            <div style="padding:6px;background:#2a2a2a;border-radius:4px">📊 report.xlsx</div>
            <div style="padding:6px;background:#2a2a2a;border-radius:4px">📑 slides.pptx</div>
            <div style="padding:6px;background:#2a2a2a;border-radius:4px">📝 contract.hwp</div>
          </div>
          <div class="mock-input">번역 언어: 영어 ▼</div>
          <div class="mock-button" style="text-align:center">전체 번역 → ZIP 다운로드</div>
        </div>
      </div>
    </div>
  </div>
</div>
