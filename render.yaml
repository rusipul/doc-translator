services:
  - type: web
    name: doc-translator-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SHARED_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PRODUCTION
        value: true
